name: CI

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            modules/**/*.md
            projects/**/*.md
            lessons/**/*.md
            !**/node_modules/**

  python-syntax:
    name: Python syntax (modules/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Compile every .py under modules/
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          files=( modules/**/*.py )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No modules/**/*.py — nothing to check (placeholder repo state)."
            exit 0
          fi
          fails=0
          for f in "${files[@]}"; do
            if ! python -m py_compile "$f"; then
              echo "::error file=$f::SyntaxError"
              fails=$((fails+1))
            fi
          done
          echo "Compiled ${#files[@]} file(s); ${fails} failure(s)."
          exit "$fails"

  autograders:
    name: Autograders must reject unfilled starters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Every check.py must FAIL on its unmodified starter
        shell: bash {0}
        run: |
          set -uo pipefail
          shopt -s globstar nullglob
          checks=( modules/**/exercises/*/check.py )
          if [ ${#checks[@]} -eq 0 ]; then
            echo "No autograders found — nothing to verify (placeholder repo state)."
            exit 0
          fi
          fails=0
          for check in "${checks[@]}"; do
            dir=$(dirname "$check")
            rc=0
            ( cd "$dir" && python check.py >/dev/null 2>&1 ) || rc=$?
            if [ "$rc" -eq 0 ]; then
              echo "::error file=$check::Autograder PASSED on unmodified starter; it must FAIL."
              fails=$((fails+1))
            else
              echo "OK: ${check} correctly rejected unfilled starter (exit $rc)"
            fi
          done
          echo "Verified ${#checks[@]} autograder(s); ${fails} false-pass(es)."
          exit "$fails"

  kubectl-dryrun:
    name: kubectl apply --dry-run=client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.29.0
      # `kubectl apply --dry-run=client` still needs to reach an API server for
      # discovery (to map each manifest's kind to a REST resource). A throwaway
      # kind cluster supplies that so the offline gate can resolve built-in types.
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          wait: 120s
      - name: Validate every Kubernetes manifest
        shell: bash
        run: |
          set -uo pipefail
          shopt -s globstar nullglob

          candidates=(
            modules/**/k8s/**/*.yaml
            modules/**/k8s/**/*.yml
            modules/**/kubernetes/**/*.yaml
            modules/**/kubernetes/**/*.yml
            modules/**/manifests/**/*.yaml
            modules/**/manifests/**/*.yml
          )
          files=()
          for pattern in "${candidates[@]}"; do
            for f in $pattern; do
              base="$(basename "$f")"
              case "$base" in
                kustomization.yaml|Chart.yaml|values.yaml|values-*.yaml)
                  continue
                  ;;
              esac
              # kubectl --dry-run=client resolves only built-in types and CRD
              # definitions; it cannot map *custom resources* whose CRDs are not
              # installed in a reachable cluster. Skip third-party (vendor) CRD
              # manifests -- a dotted API group that is not a *.k8s.io group --
              # so this offline gate does not false-fail on them.
              if grep -Eq '^[[:space:]]*apiVersion:[[:space:]]*[A-Za-z0-9.-]+\.[A-Za-z0-9.-]+/' "$f" \
                 && ! grep -Eq '^[[:space:]]*apiVersion:[[:space:]]*[A-Za-z0-9.-]+\.k8s\.io/' "$f"; then
                echo "Skipping third-party CRD manifest (CRD not installable offline): $f"
                continue
              fi
              files+=("$f")
            done
          done

          if [ ${#files[@]} -eq 0 ]; then
            echo "No Kubernetes manifests found; nothing to validate."
            exit 0
          fi

          fails=0
          skipped=0
          for f in "${files[@]}"; do
            err="$(kubectl apply --dry-run=client --validate=false -f "$f" 2>&1 >/dev/null)" && continue
            # Manifests for CustomResourceDefinitions (Istio, External Secrets,
            # Prometheus Operator, ...) can't be REST-mapped by client-side
            # dry-run unless the CRD is installed on a reachable cluster. Skip
            # those mapping/discovery failures, but still fail on real problems:
            # malformed YAML, missing apiVersion/kind, empty documents, etc.
            if printf '%s' "$err" | grep -qE 'no matches for kind|unable to recognize|ensure CRDs are installed|connection to the server|connection refused'; then
              echo "skip (kind not resolvable client-side): $f"
              skipped=$((skipped+1))
              continue
            fi
            echo "::error file=$f::kubectl dry-run rejected manifest"
            printf '%s\n' "$err"
            fails=$((fails+1))
          done
          echo "Validated ${#files[@]} manifest(s); ${fails} rejection(s), ${skipped} CRD skip(s)."
          exit "$fails"

  terraform-validate:
    name: terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.6.6
      - name: Run terraform validate in every Terraform module
        shell: bash
        run: |
          set -uo pipefail
          shopt -s globstar nullglob

          tf_dirs=()
          while IFS= read -r dir; do
            tf_dirs+=("$dir")
          done < <(find modules -type f -name '*.tf' -printf '%h\n' 2>/dev/null | sort -u)

          if [ ${#tf_dirs[@]} -eq 0 ]; then
            echo "No Terraform modules found; nothing to validate."
            exit 0
          fi

          fails=0
          for dir in "${tf_dirs[@]}"; do
            echo "=== terraform validate: $dir ==="
            if ! ( cd "$dir" && terraform init -backend=false -input=false >/dev/null 2>&1 \
                   && terraform validate -no-color ); then
              echo "::error file=$dir::terraform validate failed"
              fails=$((fails+1))
            fi
          done
          echo "Validated ${#tf_dirs[@]} Terraform module(s); ${fails} failure(s)."
          exit "$fails"

  docker-build-smoke:
    name: docker build (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build every Dockerfile (cache-only, smoke)
        shell: bash
        run: |
          set -uo pipefail
          shopt -s globstar nullglob
          dockerfiles=()
          for df in modules/**/Dockerfile modules/**/Dockerfile.*; do
            case "$df" in
              *.j2|*.jinja|*.jinja2|*.template|*.tmpl)
                # Templating sources (e.g. Dockerfile.j2) are rendered by a
                # generator before use and are not buildable as-is.
                continue
                ;;
            esac
            dockerfiles+=("$df")
          done
          if [ ${#dockerfiles[@]} -eq 0 ]; then
            echo "No Dockerfiles found; nothing to smoke-build."
            exit 0
          fi
          fails=0
          for df in "${dockerfiles[@]}"; do
            # Skip templated Dockerfiles (e.g. *.j2): they contain placeholder
            # syntax meant to be rendered before building, not built directly.
            case "$df" in
              *.j2|*.jinja|*.jinja2|*.tmpl|*.template)
                echo "Skipping Dockerfile template (rendered before build): $df"
                continue
                ;;
            esac
            ctx="$(dirname "$df")"
            echo "=== docker build: $df ==="
            if ! docker buildx build \
                --progress=plain \
                --file "$df" \
                --output type=cacheonly \
                "$ctx" >/dev/null 2>&1; then
              echo "::error file=$df::docker build failed"
              fails=$((fails+1))
            fi
          done
          echo "Smoke-built ${#dockerfiles[@]} image(s); ${fails} failure(s)."
          exit "$fails"
